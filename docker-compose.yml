services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiexe
      POSTGRES_PASSWORD: aiexe
      POSTGRES_DB: aiexe
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiexe -d aiexe"]
      interval: 2s
      timeout: 2s
      retries: 15

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: aiexe
      PGPASSWORD: aiexe
      PGDATABASE: aiexe
    volumes:
      - ./migrations:/migrations:ro
      - ./scripts/migrate.sh:/migrate.sh:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]

volumes:
  pgdata:
